<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orcslime (MVP)</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app">
    <!-- Left column UI -->
    <aside id="sidebar">
      <section class="panel">
        <h2>Time</h2>
        <div id="timeDisplay">Loading...</div>
        <button id="btnPause">Pause</button>
      </section>

      <section class="panel">
        <h2>Inventory</h2>
        <div id="inventoryDisplay">Slime Fruit: 0</div>
      </section>

      <section class="panel">
        <h2>Log</h2>
        <div id="log" class="log"></div>
      </section>
    </aside>

    <!-- Main world canvas -->
    <main id="main">
      <canvas id="gameCanvas" width="720" height="720"></canvas>
      <div class="hint">OrcJuiceWeb - v0.0.1c</div>
    </main>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>

</html>
